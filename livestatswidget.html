<!-- Drop this where you want the live stats readout on the static site -->
<div id="rtm-live-stats">Loading live supply data...</div>

<script>
    const LIVE_STATS_API = "https://rotum-protocol.vercel.app/api/stats/live-pools"; // <-- set your real domain

    async function loadLiveStats() {
        const el = document.getElementById("rtm-live-stats");
        try {
            const res = await fetch(LIVE_STATS_API);
            if (!res.ok) throw new Error("Bad response");
            const stats = await res.json();

            const poolRows = stats.pools
                .map(
                    (p) => `
        <div class="rtm-pool-row">
          <span class="rtm-pool-label">${p.label}</span>
          <span class="rtm-pool-value">${p.remaining.toLocaleString()} / ${p.allocated.toLocaleString()} RTM remaining</span>
          <div class="rtm-pool-bar">
            <div class="rtm-pool-bar-fill" style="width:${p.percentUsed}%"></div>
          </div>
        </div>`
                )
                .join("");

            el.innerHTML = `
        <div class="rtm-stats-summary">
          <strong>${stats.percentCirculating}%</strong> of total supply distributed
          (${stats.totalDistributed.toLocaleString()} / ${stats.totalSupply.toLocaleString()} RTM)
        </div>
        ${poolRows}
        <div class="rtm-stats-updated">Updated ${new Date(stats.updatedAt).toLocaleString()}</div>
      `;
        } catch (err) {
            el.innerHTML = "Live stats temporarily unavailable.";
            console.error("live-stats fetch failed", err);
        }
    }

    loadLiveStats();
    // Refresh every 60s so the readout stays live without a page reload
    setInterval(loadLiveStats, 60000);
</script>

<style>
    #rtm-live-stats {
        font-family: inherit;
    }

    .rtm-stats-summary {
        margin-bottom: 12px;
        font-size: 1.05em;
    }

    .rtm-pool-row {
        margin-bottom: 10px;
    }

    .rtm-pool-label {
        display: block;
        font-weight: 600;
    }

    .rtm-pool-value {
        display: block;
        font-size: 0.85em;
        opacity: 0.8;
    }

    .rtm-pool-bar {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 4px;
        height: 6px;
        margin-top: 4px;
        overflow: hidden;
    }

    .rtm-pool-bar-fill {
        background: currentColor;
        height: 100%;
    }

    .rtm-stats-updated {
        font-size: 0.75em;
        opacity: 0.6;
        margin-top: 8px;
    }
</style>
